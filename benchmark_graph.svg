<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { font-size: 16px; fill: #6B7280; }
    .grid-label { font-size: 13px; fill: #9CA3AF; }
    .bar-value { font-size: 26px; fill: #FFFFFF; font-weight: 400; }
    .bar-label-1 { font-size: 18px; fill: #F45A59; }
    .bar-label-2 { font-size: 18px; fill: #22C587; }
  </style>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <text x="400" y="60" class="title" text-anchor="middle">Internal benchmarking · refer to task.json for full details</text>

  <line x1="160" y1="120" x2="640" y2="120" stroke="#F3F4F6" stroke-width="1.5"/>
  <line x1="160" y1="180" x2="640" y2="180" stroke="#F3F4F6" stroke-width="1.5"/>
  <line x1="160" y1="240" x2="640" y2="240" stroke="#F3F4F6" stroke-width="1.5"/>
  <line x1="160" y1="300" x2="640" y2="300" stroke="#F3F4F6" stroke-width="1.5"/>
  <line x1="160" y1="360" x2="640" y2="360" stroke="#F3F4F6" stroke-width="1.5"/>
  
  <line x1="140" y1="420" x2="660" y2="420" stroke="#D1D5DB" stroke-width="2"/>

  <text x="140" y="124" class="grid-label" text-anchor="end">100%</text>
  <text x="140" y="184" class="grid-label" text-anchor="end">80%</text>
  <text x="140" y="244" class="grid-label" text-anchor="end">60%</text>
  <text x="140" y="304" class="grid-label" text-anchor="end">40%</text>
  <text x="140" y="364" class="grid-label" text-anchor="end">20%</text>

  <rect x="230" y="354" width="140" height="66" rx="6" fill="#F45A59" filter="url(#shadow)"/>
  <text x="300" y="395" class="bar-value" text-anchor="middle">22%</text>
  <text x="300" y="455" class="bar-label-1" text-anchor="middle">cursor touch</text>

  <rect x="430" y="153" width="140" height="267" rx="6" fill="#22C587" filter="url(#shadow)"/>
  <text x="500" y="295" class="bar-value" text-anchor="middle">89%</text>
  <text x="500" y="455" class="bar-label-2" text-anchor="middle">Auto Use</text>

</svg>
