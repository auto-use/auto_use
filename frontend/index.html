<!DOCTYPE html>

<head>

</head>
<body>

        </symbol>
    </svg>

    <!-- Globe Container for Web Search Animation (outside image container) -->
    <div class="main-globe-container" id="mainGlobeContainer"></div>

    <!-- Shell Terminal Container for Shell Command Animation (outside image container) -->
    <div class="shell-terminal-container" id="shellTerminalContainer">
        <div class="shell-terminal-card">
            <div class="shell-term-bar">
                <div class="shell-term-title" id="shellTermTitle">Shell</div>
            </div>
            <div class="shell-term-body" id="shellTermBody">
                <div class="line visible"><b>$</b> <span id="shellCmdText"></span></div>
                <div class="line" id="shellStreamLine"><span class="muted">› </span><span id="shellStreamText"></span></div>
                <div class="line" id="shellStatusLine">
                    <span class="tag run" id="shellStatusTag">●</span>
                    <span id="shellStatusText">running</span>
                    <span class="cursor" id="shellCursor" aria-hidden="true"></span>
                </div>
                <div class="shell-progress" id="shellProgress">
                    <span class="fill"></span>
                    <span class="glint" aria-hidden="true"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="image-stream-container" id="imageStreamContainer">
        <div class="liquidGlass-effect"></div>
        <div class="liquidGlass-tint"></div>
        <div class="liquidGlass-shine"></div>
        <div class="liquidGlass-content">
            <img src="" alt="Screenshot Preview" class="stream-image" style="display: none;">
        </div>
    </div>

    <svg style="display: none">
        <filter
            id="glass-distortion"
            x="-50%"
            y="-50%"
            width="200%"
            height="200%"
            filterUnits="objectBoundingBox"
        >
            <feTurbulence
                type="fractalNoise"
                baseFrequency="0.015 0.015"
                numOctaves="2"
                seed="5"
                result="turbulence"
            />

            <feComponentTransfer in="turbulence" result="mapped">
                <feFuncR type="gamma" amplitude="1" exponent="8" offset="0.5" />
                <feFuncG type="gamma" amplitude="0.5" exponent="1" offset="0" />
                <feFuncB type="gamma" amplitude="0.5" exponent="1" offset="0.5" />
            </feComponentTransfer>

            <feGaussianBlur in="turbulence" stdDeviation="4" result="softMap" />

            <feSpecularLighting
                in="softMap"
                surfaceScale="8"
                specularConstant="1.2"
                specularExponent="120"
                lighting-color="white"
                result="specLight"
            >
                <fePointLight x="-150" y="-150" z="400" />
            </feSpecularLighting>

            <feComposite
                in="specLight"
                operator="arithmetic"
                k1="0"
                k2="1"
                k3="1.2"
                k4="0"
                result="litImage"
            />

            <feDisplacementMap
                in="SourceGraphic"
                in2="softMap"
                scale="200"
                xChannelSelector="R"
                yChannelSelector="G"
            />
        </filter>
    </svg>

    <svg style="display: none">
        <filter
            id="liquid-glass-button"
            x="-50%"
            y="-50%"
            width="200%"
            height="200%"
            filterUnits="objectBoundingBox"
        >
            <feTurbulence
                type="fractalNoise"
                baseFrequency="0.03 0.05"
                numOctaves="4"
                seed="3"
                result="turbulence"
            />
            
            <feComponentTransfer in="turbulence" result="mapped">
                <feFuncR type="gamma" amplitude="1" exponent="4" offset="0.4" />
                <feFuncG type="gamma" amplitude="1" exponent="4" offset="0.4" />
            </feComponentTransfer>
            
            <feGaussianBlur in="mapped" stdDeviation="2.5" result="softMap" />
            
            <feDisplacementMap
                in="SourceGraphic"
                in2="softMap"
                scale="25"
                xChannelSelector="R"
                yChannelSelector="G"
            />
        </filter>
    </svg>

    <div class="settings-btn" id="settingsBtn" title="Settings">
        <div class="liquidGlass-effect-btn"></div>
        <div class="liquidGlass-tint-btn"></div>
        <div class="liquidGlass-shine-btn"></div>
        <div class="settings-icon-wrapper">
            <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </div>
    </div>

    <div class="glass-button-wrapper" id="llmWrapper">
        <div class="liquidGlass-effect-btn"></div>
        <div class="liquidGlass-tint-btn"></div>
        <div class="liquidGlass-shine-btn"></div>
        
        <div class="glass-button-content">
            <span class="current-selection">
                <span class="selection-text">LLM Provider</span>
            </span>
        </div>

        <div class="dropdown-options" id="dropdownOptions">
            <!-- Options will be populated dynamically -->
        </div>
    </div>

    <video id="bgVideo" autoplay muted loop playsinline aria-hidden="true">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="chat-container-wrapper" id="chatWrapper">
        <div class="liquidGlass-effect"></div>
        <div class="liquidGlass-tint"></div>
        <div class="liquidGlass-shine"></div>
        
        <div class="chat-container-content">
            <!-- New Output Stream Area -->
            <div class="output-stream-area">
                <div class="welcome-overlay" id="welcomeOverlay">
                    <div class="welcome-eye"></div>
                    <div class="welcome-eye"></div>
                    <div class="welcome-glow"></div>
                </div>
                <div class="milestone-stream" id="milestoneStream"></div>
            </div>
            
            <!-- Agent Response Strip (Hidden by default) -->
            <div class="agent-response-strip" id="agentResponseStrip">
                <div class="agent-cursor-icon"></div>
                <span class="agent-label">Agent activated:</span>
                <span class="agent-text" id="agentText"></span>
            </div>

            <div class="input-area-wrapper">
                <textarea class="chat-input" placeholder="Select a model to start..." rows="1" disabled></textarea>
                
                <!-- Stop Agent Orb Button (Hidden by default) -->
                <!-- Stop Agent Orb Button (Hidden by default) -->
                <div class="stop-agent-button" id="stopAgentBtn" title="Stop Agent">
                    <div class="stop-orb">
                        <div class="stop-circle-1"></div>
                        <div class="stop-circle-2"><div class="stop-bg"></div></div>
                        <div class="stop-pc">
                            <div class="stop-monitor"><div class="stop-screen"><div class="stop-eye"></div><div class="stop-eye"></div></div></div>
                            <div class="stop-base"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Panel Overlay -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <div class="liquidGlass-effect-btn"></div>
            <div class="liquidGlass-tint-btn"></div>
            <div class="liquidGlass-shine-btn"></div>
            
            <div class="settings-panel-content">

                <!-- Menu View (default) -->
                <div class="settings-view settings-menu-view active" id="settingsMenuView">
                    <div class="settings-header">
                        <span class="settings-title">Settings</span>
                        <button class="settings-close-btn" id="settingsCloseBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div class="settings-menu-list">
                        <div class="settings-menu-item" data-view="apikeys">
                            <span>API Keys</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                        <div class="settings-menu-item" data-view="remote">
                            <span>Remote Connection</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </div>
                </div>

                <!-- API Keys View -->
                <div class="settings-view settings-apikeys-view" id="settingsApikeysView">
                    <div class="settings-sub-header">
                        <button class="settings-back-btn" data-view="menu">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <span class="settings-title">API Keys</span>
                    </div>
                    <div class="settings-provider-list">
                        <div class="settings-provider-row" data-provider="openrouter">
                            <a class="settings-provider-name" href="https://openrouter.ai/keys" target="_blank">OpenRouter</a>
                            <input type="password" class="settings-provider-input" placeholder="sk-or-..." autocomplete="off" />
                            <button class="settings-delete-btn" title="Remove API key" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="settings-provider-row" data-provider="groq">
                            <a class="settings-provider-name" href="https://console.groq.com/keys" target="_blank">Groq</a>
                            <input type="password" class="settings-provider-input" placeholder="gsk_..." autocomplete="off" />
                            <button class="settings-delete-btn" title="Remove API key" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="settings-provider-row" data-provider="openai">
                            <a class="settings-provider-name" href="https://platform.openai.com/api-keys" target="_blank">OpenAI</a>
                            <input type="password" class="settings-provider-input" placeholder="sk-..." autocomplete="off" />
                            <button class="settings-delete-btn" title="Remove API key" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="settings-provider-row" data-provider="anthropic">
                            <a class="settings-provider-name" href="https://console.anthropic.com/settings/keys" target="_blank">Anthropic</a>
                            <input type="password" class="settings-provider-input" placeholder="sk-ant-..." autocomplete="off" />
                            <button class="settings-delete-btn" title="Remove API key" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="settings-provider-row" data-provider="perplexity">
                            <a class="settings-provider-name" href="https://docs.perplexity.ai/guides/getting-started" target="_blank">Perplexity</a>
                            <input type="password" class="settings-provider-input" placeholder="pplx-..." autocomplete="off" />
                            <button class="settings-delete-btn" title="Remove API key" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="settings-provider-row" data-provider="google">
                            <a class="settings-provider-name" href="https://aistudio.google.com/apikey" target="_blank">Google</a>
                            <input type="password" class="settings-provider-input google-key-input" placeholder="AIza..." autocomplete="off" />
                            <button class="settings-delete-btn" title="Remove API key" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                            <button class="gcp-vertex-btn" id="gcpVertexBtn" title="Configure GCP Vertex AI">GCP Vertex</button>

                    </div>
                    <button class="settings-save-btn" id="settingsSaveBtn">Save</button>
                </div>

                <!-- Remote Connection View -->
                <div class="settings-view settings-remote-view" id="settingsRemoteView">
                    <div class="settings-sub-header">
                        <button class="settings-back-btn" data-view="menu">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <span class="settings-title">Remote Connection</span>
                    </div>

                    <!-- Not connected state -->
                    <div class="remote-setup" id="remoteSetup">
                        <div class="remote-qr-container" id="remoteQrContainer"></div>
                        <div class="remote-instruction">Scan with your phone to pair via Telegram</div>
                    </div>

                    <!-- Connected state -->
                    <div class="remote-connected" id="remoteConnected" style="display:none;">
                        <div class="remote-status-icon">✅</div>
                        <div class="remote-bot-name" id="remoteBotName">@bot</div>
                        <div class="remote-status-label">Connected & listening</div>
                        <button class="remote-disconnect-btn" id="remoteDisconnectBtn">Disconnect</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- GCP Vertex AI Popup -->
    <div class="vertex-overlay" id="vertexOverlay">
        <div class="vertex-popup">
            <div class="liquidGlass-effect-btn"></div>
            <div class="liquidGlass-tint-btn"></div>
            <div class="liquidGlass-shine-btn"></div>
            <div class="vertex-popup-content">
                <span class="vertex-popup-title">GCP Vertex AI</span>
                <div class="vertex-field">
                    <label class="vertex-label">Project ID</label>
                    <input type="text" class="vertex-input" id="vertexProjectId" placeholder="my-gcp-project" autocomplete="off" />
                </div>
                <div class="vertex-field">
                    <label class="vertex-label">Location</label>
                    <input type="text" class="vertex-input vertex-location-input" id="vertexLocation" value="global" autocomplete="off" />
                </div>
                <button class="vertex-done-btn" id="vertexDoneBtn">Done</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
