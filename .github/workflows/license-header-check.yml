name: Auto-Add License Header

on:
  pull_request:
    branches: [main, developer-branch]

permissions:
  contents: write
  pull-requests: write

jobs:
  add-headers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add SPDX header to Python files missing it
        run: |
          set -e
          HEADER='# SPDX-License-Identifier: LicenseRef-Autouse-Proprietary
          # Copyright (c) 2026 Ashish Yadav - Autouse AI
          # All rights reserved. Proprietary and confidential.
          # See LICENSE and NOTICE at the repo root for terms.
          '
          modified=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              if ! head -n 1 "$file" | grep -q "SPDX-License-Identifier"; then
                echo "Adding header to: $file"
                tmp=$(mktemp)
                printf '%s\n' "$HEADER" > "$tmp"
                cat "$file" >> "$tmp"
                mv "$tmp" "$file"
                modified=$((modified+1))
              fi
            fi
          done < <(find . -type f -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" -not -path "./__pycache__/*")
          echo "Modified $modified file(s)"
          echo "MODIFIED=$modified" >> $GITHUB_ENV

      - name: Commit and push changes
        if: env.MODIFIED != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-add SPDX license headers"
          git push
