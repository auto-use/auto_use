name: License Header Check

on:
  pull_request_target:
    branches: [main, developer-branch]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  check-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          HEADER='# SPDX-License-Identifier: LicenseRef-Autouse-Proprietary
          # Copyright (c) 2026 Ashish Yadav - Autouse AI
          # All rights reserved. Proprietary and confidential.
          # See LICENSE and NOTICE at the repo root for terms.
          '
          modified=0
          while IFS= read -r file; do
            if ! head -n 1 "$file" | grep -q "SPDX-License-Identifier"; then
              tmp=$(mktemp)
              printf '%s\n' "$HEADER" > "$tmp"
              cat "$file" >> "$tmp"
              mv "$tmp" "$file"
              modified=$((modified+1))
            fi
          done < <(find . -type f -name "*.py" -not -path "./venv/*")
          echo "MODIFIED=$modified" >> $GITHUB_ENV
          echo "All good."

      - if: env.MODIFIED != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-add SPDX license headers"
          git push
